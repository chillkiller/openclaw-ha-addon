# OpenClaw Dev-Addon v0.7.5 Configuration
# BEST-OF-ALL-WORLDS BUILD: Trixie Full-Stack + coollabsio Persistence + techartdev HA-Integration
# CHANGELOG v0.7.0:
#   - Added mDNS configuration options for LAN discovery
#   - Added runtime apt packages option (coollabsio pattern)
#   - Added custom init script option (coollabsio pattern)
#   - Version bump to trigger HA rebuild
name: OpenClaw Assistant (Dev)
version: "0.7.5.2"
slug: openclaw_ha_addon_dev
description: OpenClaw Home Assistant Addon (Development Branch - Trixie Full-Stack)
url: https://github.com/chillkiller/OpenClawHomeAssistant
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: false
homeassistant_api: false
host_network: true

# Home Assistant Ingress (UI inside the add-on page)
ingress: true
ingress_port: 48099
panel_title: OpenClaw Assistant (Dev)
panel_icon: mdi:robot

map:
  - addon_config:rw
  - share:rw
  - media:rw
options:
  timezone: "Europe/Berlin"

  # Enable web terminal inside Home Assistant (Ingress) via ttyd
  enable_terminal: true
  terminal_port: 7681

  # Public base URL for opening the Gateway Web UI in a new tab (not embedded).
  # Recommended: NO trailing slash.
  # Example: "https://example.duckdns.org:12345" or "http://192.168.1.10:18789"
  gateway_public_url: ""

  # Optional: Home Assistant long-lived token (for local HA API scripts/tools)
  homeassistant_token: ""

  # Optional: outbound HTTP/HTTPS proxy for OpenClaw network access.
  # Example: "http://192.168.2.1:3128"
  http_proxy: ""

  # Optional: Router SSH defaults (leave empty if you don't need router automation)
  router_ssh_host: ""
  router_ssh_user: ""
  router_ssh_key_path: "/data/keys/router_ssh"

  # Cleanup stale session lock files left after crashes/restarts
  clean_session_locks_on_start: true
  clean_session_locks_on_exit: true

  # Gateway mode: local (run locally) or remote (connect to external gateway)
  gateway_mode: local
  gateway_remote_url: ""

  # Gateway network bind mode:
  # loopback: 127.0.0.1 only (most secure, Ingress/terminal only)
  # lan: all interfaces (LAN accessible)
  # tailnet: Tailscale IP only (remote via Tailscale)
  gateway_bind_mode: loopback
  gateway_port: 18789

  # Access mode preset — simplifies secure access configuration
  # custom: use individual settings above (backward compatible)
  # local_only: loopback + token auth (Ingress/terminal only)
  # lan_https: Built-in HTTPS proxy for LAN (recommended for phones/tablets)
  # lan_reverse_proxy: LAN bind + trusted-proxy for external reverse proxy
  # tailnet_https: Tailscale interface bind + token auth
  access_mode: custom

  # Gateway authentication mode: token (default) or trusted-proxy
  gateway_auth_mode: token
  gateway_trusted_proxies: ""
  gateway_additional_allowed_origins: ""

  # Disable per-device Control UI auth ceremony (avoids pairing error 1008 on LAN)
  controlui_disable_device_auth: false

  # Enable OpenAI-compatible Chat Completions API endpoint (for HA Assist pipeline)
  enable_openai_api: false

  # Force IPv4-first DNS (most HAOS VMs lack IPv6 egress)
  force_ipv4_dns: true

  # Nginx access log verbosity: full or minimal
  nginx_log_level: minimal

  # mDNS/Bonjour configuration for LAN discovery
  # off: no mDNS advertisement
  # minimal: advertise gateway service (default)
  # full: verbose mDNS with all metadata
  mdns_mode: minimal
  # Hostname to advertise (empty = auto-detect from HA hostname)
  mdns_host_name: ""
  # Service port to advertise in mDNS (default: gateway_port)
  # IMPORTANT: In lan_https mode, this should match the public HTTPS port
  mdns_service_port: 18789
  # Network interface for mDNS (empty = auto-detect)
  mdns_interface_name: ""

  # Gateway log output: mirror gateway stdout/stderr to HA add-on log window
  # When false (default), gateway logs go to /config/clawd/logs/gateway_startup.log only
  # When true, gateway output also visible on HA console (useful for debugging)
  gateway_log_to_console: false

  # Environment variables to pass to the gateway process at startup.
  # Format: list of objects with name/value fields.
  # Example:
  #   gateway_env_vars:
  #     - name: OPENAI_API_KEY
  #       value: "sk-abc123"
  # Reserved keys blocked: PATH, HOME, NODE_OPTIONS, OPENCLAW_*, proxy vars, LD_*
  # Limits: max 50 variables, max key 255 chars, max value 10000 chars.
  gateway_env_vars: []

  # Auto-configure MCP (Model Context Protocol) for Home Assistant.
  # When enabled + homeassistant_token set, registers HA as MCP server.
  auto_configure_mcp: false

  # Optional: Space-separated list of apt packages to install at container startup.
  # Packages are reinstalled on each restart (not persistent in image).
  # Example: "ffmpeg postgresql-client"
  runtime_apt_packages: ""

  # Optional: Path to a custom init script that runs before OpenClaw starts.
  # Must be executable and idempotent. Mounted via /config/ or /share/.
  # Example: "/share/scripts/my-init.sh"
  custom_init_script: ""

schema:
  timezone: str
  enable_terminal: bool?
  terminal_port: int(1024,65535)?
  gateway_public_url: str?
  homeassistant_token: str?
  http_proxy: str?
  router_ssh_host: str
  router_ssh_user: str
  router_ssh_key_path: str
  clean_session_locks_on_start: bool?
  clean_session_locks_on_exit: bool?
  gateway_mode: list(local|remote)?
  gateway_remote_url: str?
  gateway_bind_mode: list(loopback|lan|tailnet)?
  gateway_port: int(1,65535)?
  access_mode: list(custom|local_only|lan_https|lan_reverse_proxy|tailnet_https)?
  gateway_auth_mode: list(token|trusted-proxy)?
  gateway_trusted_proxies: str?
  gateway_additional_allowed_origins: str?
  controlui_disable_device_auth: bool?
  enable_openai_api: bool?
  force_ipv4_dns: bool?
  nginx_log_level: list(full|minimal)?
  mdns_mode: list(off|minimal|full)?
  mdns_host_name: str?
  mdns_service_port: int(1,65535)?
  mdns_interface_name: str?
  gateway_log_to_console: bool?
  gateway_env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]*$)"
      value: str
  auto_configure_mcp: bool?
  runtime_apt_packages: str?
  custom_init_script: str?
