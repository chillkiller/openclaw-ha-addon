name: OpenClaw Assistant Dev (Sovereign)
version: "0.6.0"
slug: openclaw_assistant_dev
description: Ultimate OpenClaw Dev-Addon mit Debian Trixie, mDNS-Fix und Sovereign-Konfiguration
url: https://github.com/chillkiller/OpenClawHomeAssistant
arch:
  - amd64
  - aarch64
boot: application
init: false
startup: application
homeassistant: 2024.1.0
hassio_api: true
hassio_role: manager
host_dbus: true
host_network: true
host_pid: false
host_uts: false
privileged: []
groups:
  - video
  - render
  - input
  - tty
devices:
  - /dev/dri:/dev/dri
map:
  - config:rw
  - data:rw
  - share:rw
  - ssl:ro
  - addons:ro
ports:
  48099/tcp: 48099
  7681/tcp: null
  18789/tcp: null
schema:
  timezone: str
  gateway_mode: list(local|remote)
  gateway_remote_url: str?
  gateway_bind_mode: list(loopback|lan|tailnet)
  gateway_port: int(1,65535)
  gateway_auth_mode: list(token|trusted-proxy)
  gateway_trusted_proxies: str?
  gateway_additional_allowed_origins: str?
  gateway_public_url: str?
  enable_openai_api: bool
  access_mode: list(local_only|lan_https|lan_reverse_proxy|tailnet_https|custom)
  nginx_log_level: list(minimal|standard)
  enable_terminal: bool
  terminal_port: int(1024,65535)
  http_proxy: str?
  force_ipv4_dns: bool
  clean_session_locks_on_start: bool
  clean_session_locks_on_exit: bool
  auto_configure_mcp: bool
  homeassistant_token: str?
  controlui_disable_device_auth: bool
  router_ssh_host: str?
  router_ssh_user: str?
  router_ssh_key_path: str?
  gateway_env_vars:
    - name: str
      value: str
  # mDNS Konfiguration (NEU - Sovereign Fix)
  mdns_mode: list(off|minimal|full)
  mdns_interface_name: str?
  mdns_service_port: int(1,65535)
  mdns_host_name: str?
options:
  timezone: Europe/Berlin
  gateway_mode: local
  gateway_bind_mode: loopback
  gateway_port: 18789
  gateway_auth_mode: token
  access_mode: lan_https
  nginx_log_level: minimal
  enable_terminal: true
  terminal_port: 7681
  force_ipv4_dns: true
  clean_session_locks_on_start: true
  clean_session_locks_on_exit: true
  auto_configure_mcp: false
  controlui_disable_device_auth: true
  enable_openai_api: false
  # mDNS Konfiguration (NEU)
  mdns_mode: minimal
  mdns_service_port: 18789
stage: stable
