# OpenClaw Build Specification v0.6.5

build:
  context: .
  dockerfile: Dockerfile
  tags:
    - openclaw-dev-addon:v0.6.6
    - openclaw-dev-addon:latest

pipeline:
  trigger:
    - branch: master
    - event: push
  steps:
    - name: "Build Image"
      action: docker_build
    - name: "Push to Registry"
      action: docker_push
    - name: "Deploy to Host"
      action: deploy_host
      target: gateway-node

verification:
  tests:
    - "openclaw --version"
    - "openclaw gateway status"
  expected_version: "0.6.6"
