configuration:
  timezone:
    name: Zeitzone
    description: Zeitzone für das Add-on (z.B. Europe/Berlin, America/New_York)
  
  enable_terminal:
    name: Web-Terminal aktivieren
    description: Web-Terminal-Schaltfläche in Home Assistant (Ingress) über ttyd aktivieren
  
  terminal_port:
    name: Terminal-Port
    description: Portnummer für das Web-Terminal (Standard - 7681). Ändern, wenn dieser Port mit einem anderen Dienst kollidiert.
  
  gateway_public_url:
    name: Öffentliche Gateway-URL
    description: Öffentliche Basis-URL zum Öffnen der Gateway-Weboberfläche in einem neuen Tab (nicht eingebettet). Beispiel - https://meinserver.duckdns.org:12345 oder http://192.168.1.10:18789
  
  homeassistant_token:
    name: Home Assistant Token
    description: Optional - Langlebiger Home Assistant Token für lokale API-Skripte/Tools

  http_proxy:
    name: Ausgehender HTTP-Proxy
    description: Optional - Proxy-URL für ausgehende HTTP/HTTPS-Anfragen (Beispiel - http://192.168.2.1:3128)
  
  router_ssh_host:
    name: Router SSH-Host
    description: Optional - SSH-Hostname oder IP-Adresse des Routers/der Firewall
  
  router_ssh_user:
    name: Router SSH-Benutzer
    description: Optional - SSH-Benutzername für Router/Firewall
  
  router_ssh_key_path:
    name: Router SSH-Schlüsselpfad
    description: Pfad zum privaten SSH-Schlüssel für Router-Zugriff (Standard - /data/keys/router_ssh)
  
  clean_session_locks_on_start:
    name: Sitzungssperren beim Start bereinigen
    description: Veraltete Sitzungssperrdateien nach Abstürzen/Neustarts beim Start des Add-ons bereinigen
  
  clean_session_locks_on_exit:
    name: Sitzungssperren beim Beenden bereinigen
    description: Sitzungssperrdateien beim ordnungsgemäßen Stoppen des Add-ons bereinigen
  
  gateway_mode:
    name: Gateway-Modus
    description: Gateway-Betriebsmodus - local (Gateway lokal ausführen, empfohlen) oder remote (mit einem entfernten Gateway verbinden)
    options:
      local: "Lokal (empfohlen)"
      remote: "Remote"

  gateway_remote_url:
    name: Remote Gateway-URL
    description: Remote-Gateway-WebSocket-URL, verwendet wenn Gateway-Modus auf Remote steht (Beispiel - ws://192.168.1.20:18789 oder wss://gateway.example.com:443)

  gateway_additional_allowed_origins:
    name: Zusätzliche erlaubte Origins
    description: Kommagetrennte zusätzliche Control-UI-Origins, die bei lan_https in gateway.controlUi.allowedOrigins zusammengeführt werden (Beispiel - https://ha.example.com:8443,capacitor://localhost)

  controlui_disable_device_auth:
    name: Control-UI-Geräte-Pairing deaktivieren (lan_https)
    description: "Wenn EIN (empfohlen), setzt dies gateway.controlUi.dangerouslyDisableDeviceAuth=true, überspringt die Gerätefreigabe und vermeidet Fehler 1008 im LAN-HTTPS-Modus. Für Heim-/vertrauenswürdiges LAN eingeschaltet lassen. Nur AUS schalten, wenn du striktes Geräte-Pairing für jeden neuen Browser/jedes neue Gerät willst."

  gateway_bind_mode:
    name: Gateway-Bindungsmodus
    description: Netzwerk-Bindungsmodus - loopback (nur 127.0.0.1, am sichersten), lan (alle Schnittstellen) oder tailnet (nur Tailscale-Schnittstelle). Wird durch Zugriffsmodus-Voreinstellungen überschrieben.
    options:
      loopback: "Loopback (nur 127.0.0.1, am sichersten)"
      lan: "LAN (alle Schnittstellen)"
      tailnet: "Tailnet (nur Tailscale)"

  gateway_port:
    name: Gateway-Port
    description: Portnummer, auf der das OpenClaw-Gateway lauscht (Standard - 18789)

  access_mode:
    name: Zugriffsmodus
    description: "Vereinfacht die sichere Zugriffskonfiguration. Überschreibt gateway_bind_mode und gateway_auth_mode wenn nicht auf Benutzerdefiniert gesetzt."
    options:
      custom: "Benutzerdefiniert (individuelle Einstellungen)"
      local_only: "Nur lokal (Loopback + Token, nur Ingress)"
      lan_https: "LAN HTTPS (eingebauter HTTPS-Proxy — empfohlen für Smartphones)"
      lan_reverse_proxy: "LAN Reverse-Proxy (externer Proxy mit Trusted-Proxy-Auth)"
      tailnet_https: "Tailscale HTTPS (Tailscale-Bindung + Token)"

  gateway_auth_mode:
    name: Gateway-Authentifizierungsmodus
    description: Gateway-Auth-Modus - token (Standard) oder trusted-proxy (für HTTPS-Reverse-Proxys). Wird überschrieben wenn Zugriffsmodus nicht auf Benutzerdefiniert steht.
    options:
      token: "Token (Standard)"
      trusted-proxy: "Vertrauenswürdiger Proxy (für Reverse-Proxys)"

  gateway_trusted_proxies:
    name: Vertrauenswürdige Gateway-Proxys
    description: Komma-getrennte Liste vertrauenswürdiger Proxy-IPs/CIDRs für den Trusted-Proxy-Modus (Beispiel - 127.0.0.1,192.168.88.0/24).

  enable_openai_api:
    name: OpenAI API aktivieren
    description: OpenAI-kompatiblen Chat-Completions-Endpunkt aktivieren. Ermöglicht die Verwendung von OpenClaw als Gesprächsagent in der HA-Assist-Pipeline über Extended OpenAI Conversation (HACS) oder jeden OpenAI-kompatiblen Client.

  force_ipv4_dns:
    name: IPv4-DNS-Reihenfolge erzwingen
    description: Erzwingt IPv4-vorrangige DNS-Auflösung. Die meisten HAOS-VMs haben keinen IPv6-Ausgang — verursacht web_fetch- und Telegram-Timeouts. Empfohlen EIN (Standard).

  nginx_log_level:
    name: Nginx Log-Level
    description: "Ausführlichkeit des Nginx-Zugriffslogs. 'minimal' (Standard) unterdrückt wiederholte HA-Healthcheck- und Polling-Anfragen. 'full' protokolliert alles."
    options:
      minimal: "Minimal (HA-Polling-Rauschen unterdrücken)"
      full: "Vollständig (alle Anfragen protokollieren)"

  mdns_mode:
    name: mDNS-Modus
    description: "mDNS/Bonjour-Konfiguration für LAN-Erkennung. 'off' deaktiviert mDNS, 'minimal' bewirbt den Gateway-Dienst (Standard), 'full' bewirbt mit allen Metadaten."
    options:
      off: "Aus (kein mDNS)"
      minimal: "Minimal (Gateway-Dienst bewerben, Standard)"
      full: "Vollständig (alle Metadaten bewerben)"

  mdns_host_name:
    name: mDNS-Hostname
    description: Optionaler Hostname für mDNS-Advertisements (z.B. homeassistant.local). Wenn leer, wird der Container-Hostname automatisch erkannt.

  mdns_service_port:
    name: mDNS-Dienst-Port
    description: Port, der über mDNS für die Erkennung angekündigt wird. Standard ist der Gateway-Port (18789). Sollte im lan_https-Modus dem externen Proxy-Port entsprechen.

  mdns_interface_name:
    name: mDNS-Netzwerkschnittstelle
    description: Optionaler Name der Netzwerkschnittstelle für mDNS (z.B. eth0, wlan0). Wenn leer, wird die Schnittstelle automatisch erkannt.

  gateway_log_to_console:
    name: Gateway-Log in HA-Log anzeigen
    description: Wenn EIN, wird die Gateway-Ausgabe (stdout/stderr) zusätzlich zur Log-Datei auch im Home Assistant Add-on-Log-Fenster angezeigt. Nützlich für Echtzeit-Diagnose. Bei AUS werden Logs nur in die Datei geschrieben.

  trace_log_to_console:
    name: Boot-Trace in HA-Log anzeigen
    description: Wenn EIN, wird die detaillierte Boot-Sequenz (set -x Trace) zusätzlich zur Log-Datei auch im Home Assistant Add-on-Log-Fenster angezeigt. Sehr ausführlich — nur für Fehleranalyse aktivieren.

  gateway_env_vars:
    name: Gateway-Umgebungsvariablen
    description: Umgebungsvariablen, die beim Start an den OpenClaw-Gateway-Prozess übergeben werden (Liste mit name/value-Einträgen in der Home Assistant UI; max. 50 Variablen, Schlüssel bis 255 Zeichen, Werte bis 10.000 Zeichen).

  auto_configure_mcp:
    name: MCP für Home Assistant automatisch konfigurieren
    description: "Wenn AN und Home Assistant Token gesetzt ist, wird Home Assistant bei jedem Start automatisch als MCP-Server registriert. Das erlaubt OpenClaw, HA-Geräte, -Dienste und -Automatisierungen über das Model Context Protocol zu steuern. Nur deaktivieren, wenn die mcporter-Konfiguration manuell verwaltet wird."

  runtime_apt_packages:
    name: Laufzeit-APT-Pakete
    description: Optional - Leerzeichengetrennte Liste von APT-Paketen, die bei jedem Container-Start installiert werden. Pakete werden bei Neustarts neu installiert (nicht im Image persistent). Beispiel - ffmpeg postgresql-client

  custom_init_script:
    name: Benutzerdefiniertes Init-Skript
    description: Optional - Pfad zu einem ausführbaren Skript, das vor dem OpenClaw-Start ausgeführt wird. Muss idempotent sein. Über /config/ oder /share/ einbinden. Beispiel - /share/scripts/my-init.sh